<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e8a49"/>
      <stop offset="100%" stop-color="#12aa5b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative dots grid -->
  <g opacity="0.06" fill="#12aa5b">
    <circle cx="900" cy="100" r="80"/>
    <circle cx="1050" cy="200" r="120"/>
    <circle cx="950" cy="400" r="60"/>
    <circle cx="1100" cy="500" r="90"/>
  </g>

  <!-- Logo mark: three bars -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="48" height="14" rx="2" fill="#12aa5b"/>
    <rect x="0" y="22" width="34" height="14" rx="2" fill="#019f39"/>
    <rect x="0" y="44" width="48" height="14" rx="2" fill="#12aa5b"/>
  </g>

  <!-- TECHLUR text -->
  <text x="145" y="126" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#9ca3af" letter-spacing="6">TECHLUR</text>

  <!-- Main title -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#f9fafb" letter-spacing="-1">Ace Your Next</text>
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#12aa5b" letter-spacing="-1">Developer Interview</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#9ca3af">Community-driven interview prep with model answers</text>

  <!-- Stats bar -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="200" height="48" rx="24" fill="rgba(18,170,91,0.15)" stroke="rgba(18,170,91,0.3)" stroke-width="1"/>
    <text x="100" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#12aa5b" text-anchor="middle">77+ Questions</text>

    <rect x="220" y="0" width="180" height="48" rx="24" fill="rgba(18,170,91,0.15)" stroke="rgba(18,170,91,0.3)" stroke-width="1"/>
    <text x="310" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#12aa5b" text-anchor="middle">5 Topic Areas</text>

    <rect x="420" y="0" width="200" height="48" rx="24" fill="rgba(18,170,91,0.15)" stroke="rgba(18,170,91,0.3)" stroke-width="1"/>
    <text x="520" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#12aa5b" text-anchor="middle">Open Source</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>

  <!-- URL -->
  <text x="1120" y="600" font-family="monospace" font-size="14" fill="#6b7280" text-anchor="end">learn.techlursoftware.com</text>
</svg>
